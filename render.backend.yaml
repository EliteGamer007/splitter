services:
  - type: web
    name: splitter-instance-1
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: ENV
        value: production
      - key: FEDERATION_ENABLED
        value: "true"
      - key: FEDERATION_DOMAIN
        value: splitter-instance-1
      - key: FEDERATION_URL
        value: https://splitter-instance-1.onrender.com
      - key: BASE_URL
        value: https://splitter-instance-1.onrender.com
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: worker
    name: splitter-worker-1
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    dockerCommand: worker
    envVars:
      - key: ENV
        value: production
      - key: FEDERATION_ENABLED
        value: "true"
      - key: FEDERATION_DOMAIN
        value: splitter-instance-1
      - key: FEDERATION_URL
        value: https://splitter-instance-1.onrender.com
      - key: BASE_URL
        value: https://splitter-instance-1.onrender.com
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false

